version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: samisell/plugtoplaylist-app:latest
    container_name: plugtoplaylist-app
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_TURNSTILE_ENABLED=${NEXT_PUBLIC_TURNSTILE_ENABLED}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    command: ["npm", "run", "start"]
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: plugtoplaylist-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: playlists
      MYSQL_USER: playlists
      MYSQL_PASSWORD: PLAYlists
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    driver: local