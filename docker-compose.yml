version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: plugtoplaylist-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "playlists"
      MYSQL_USER: "playlists"
      MYSQL_PASSWORD: "PLAYlists"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root_change_me}"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  git-sync:
    image: alpine/git:2.47.2
    container_name: plugtoplaylist-git-sync
    restart: "no"
    environment:
      GIT_REPO: "https://github.com/samisell/plugtoplaylist-next.git"
      GIT_BRANCH: "main"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - app_code:/workspace
    command: >
      sh -lc '
      set -e;
      if [ ! -d /workspace/.git ]; then
        git clone --branch "$$GIT_BRANCH" --single-branch "$$GIT_REPO" /workspace;
      else
        cd /workspace;
        git fetch origin "$$GIT_BRANCH";
        git reset --hard "origin/$$GIT_BRANCH";
      fi
      '

  plugtoplaylist:
    image: node:18-bullseye-slim
    container_name: plugtoplaylist-next
    restart: unless-stopped
    depends_on:
      - mysql
      - git-sync
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "mysql://playlists:PLAYlists@mysql:3306/playlists"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      SITE_NAME: "${SITE_NAME:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY:-}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
      NEXT_PUBLIC_TURNSTILE_ENABLED: "${NEXT_PUBLIC_TURNSTILE_ENABLED:-}"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
    volumes:
      - app_code:/workspace
    working_dir: /workspace
    command: >
      sh -lc '
      until [ -f /workspace/package.json ]; do
        echo "Waiting for repository sync...";
        sleep 2;
      done;
      npm install;
      npx prisma generate;
      npm run build;
      npx prisma migrate deploy || true;
      node .next/standalone/server.js
      '

volumes:
  app_code:
  mysql_data:
