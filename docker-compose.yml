version: "3.9"

services:
  plugtoplaylist:
    image: node:18-bullseye-slim
    container_name: plugtoplaylist-next
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GIT_REPO: "https://github.com/samisell/plugtoplaylist-next.git"
      GIT_BRANCH: "main"
      NODE_ENV: "production"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "${DATABASE_URL}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      SITE_NAME: "${SITE_NAME}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET}"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXT_PUBLIC_TURNSTILE_ENABLED: "${NEXT_PUBLIC_TURNSTILE_ENABLED}"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY}"
    volumes:
      - app_code:/workspace
    working_dir: /workspace
    command: >
      sh -lc '
      set -e;
      export DEBIAN_FRONTEND=noninteractive;
      apt-get update;
      apt-get install -y --no-install-recommends git ca-certificates;
      rm -rf /var/lib/apt/lists/*;
      if [ ! -d .git ]; then
        git clone --branch "$GIT_BRANCH" --single-branch "$GIT_REPO" /workspace;
      else
        git fetch origin "$GIT_BRANCH";
        git reset --hard "origin/$GIT_BRANCH";
      fi;
      npm ci;
      npx prisma generate;
      npm run build;
      npm run start
      '

volumes:
  app_code:
