version: "3.9"

services:
  mysql:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "playlists"
      MYSQL_USER: "playlists"
      MYSQL_PASSWORD: "PLAYlists"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root_change_me}"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  plugtoplaylist:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mysql
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${APP_PORT:-3001}:3000"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "mysql://playlists:PLAYlists@mysql:3306/playlists"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      SITE_NAME: "${SITE_NAME:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY:-}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
      NEXT_PUBLIC_TURNSTILE_ENABLED: "${NEXT_PUBLIC_TURNSTILE_ENABLED:-}"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
    command: >
      sh -lc '
      npx prisma migrate deploy || true;
      npm run build;
      node .next/standalone/server.js
      '

volumes:
  mysql_data:
